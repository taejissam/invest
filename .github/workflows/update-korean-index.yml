name: Update Korean Index Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 0-7 * * 1-5"
    - cron: "0 8-23 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Korean index JSON
        run: node scripts/update-korean-index.mjs

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/korean-index.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Korean index cache"
            git push
          fi
